<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>collabterm — shared session</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
  :root { --bg:#0d0d0d; --panel:#161616; --line:#2a2a2a; --fg:#e6e6e6; --muted:#8a8a8a; --accent:#d97757; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family:'Cascadia Code','Cascadia Mono',Consolas,ui-monospace,monospace; }

  /* login gate */
  #login { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(1200px 600px at 50% -10%, #1b1b1b, #0d0d0d); z-index:10; }
  #login .card { width:340px; background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:26px 24px; box-shadow:0 20px 60px rgba(0,0,0,.5); }
  #login h1 { margin:0 0 4px; font-size:18px; }
  #login h1 b { color:var(--accent); }
  #login p { margin:0 0 18px; color:var(--muted); font-size:12px; }
  #login label { display:block; font-size:11px; color:var(--muted); margin:12px 0 5px; letter-spacing:.04em; text-transform:uppercase; }
  #login input { width:100%; padding:10px 12px; background:#0d0d0d; border:1px solid var(--line); border-radius:8px;
    color:var(--fg); font:inherit; font-size:14px; }
  #login input:focus { outline:none; border-color:var(--accent); }
  #login button { margin-top:18px; width:100%; padding:11px; background:var(--accent); color:#1a0f0a; border:0;
    border-radius:8px; font:inherit; font-weight:700; font-size:14px; cursor:pointer; }
  #login button:hover { filter:brightness(1.08); }
  #err { color:#ff8d8d; font-size:12px; min-height:16px; margin-top:10px; }

  /* app */
  #app { display:none; height:100%; flex-direction:column; }
  header { display:flex; align-items:center; gap:12px; padding:8px 14px; background:var(--panel);
    border-bottom:1px solid var(--line); }
  header .dot { width:9px; height:9px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); }
  header .title { font-size:13px; font-weight:700; }
  header .title b { color:var(--accent); }
  header .users { margin-left:auto; display:flex; gap:8px; flex-wrap:wrap; }
  header .chip { font-size:11px; padding:3px 9px; border-radius:999px; background:#0d0d0d; border:1px solid var(--line);
    display:inline-flex; align-items:center; gap:6px; }
  header .chip .on { color:var(--muted); font-size:10px; }
  header #killbtn { display:none; margin-left:8px; background:#3a1414; color:#ff8d8d; border:1px solid #5a1f1f;
    border-radius:7px; font:inherit; font-size:11px; font-weight:700; padding:5px 11px; cursor:pointer; white-space:nowrap; }
  header #killbtn:hover { background:#5a1f1f; color:#ffbcbc; }
  header #killbtn:disabled { opacity:.6; cursor:default; }

  /* session-ended overlay (shown to everyone after the host stops it) */
  #killed { position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:20;
    background:rgba(8,8,8,.93); text-align:center; padding:24px; }
  #killed .box { max-width:420px; }
  #killed h2 { color:#ff8d8d; margin:0 0 10px; font-size:20px; }
  #killed p { color:var(--muted); font-size:13px; margin:0; line-height:1.5; }

  /* tab bar */
  #tabbar { display:flex; align-items:stretch; gap:4px; padding:6px 8px 0; background:var(--panel);
    border-bottom:1px solid var(--line); overflow-x:auto; }
  #tabbar .tab { display:inline-flex; align-items:center; gap:8px; padding:7px 10px 7px 12px; cursor:pointer;
    background:#0d0d0d; border:1px solid var(--line); border-bottom:none; border-radius:8px 8px 0 0;
    color:var(--muted); font-size:12px; white-space:nowrap; position:relative; top:1px; transition:color .12s, background .12s; }
  #tabbar .tab:hover { color:var(--fg); }
  #tabbar .tab.active { background:var(--bg); color:var(--fg); border-color:var(--line); }
  #tabbar .tab.active::after { content:''; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--accent); }
  #tabbar .tab .label { outline:none; }
  #tabbar .tab .badge { display:inline-flex; gap:2px; }
  #tabbar .tab .badge i { width:7px; height:7px; border-radius:50%; display:inline-block; }
  #tabbar .tab .x { color:var(--muted); font-size:13px; line-height:1; padding:0 2px; border-radius:4px; opacity:.55; }
  #tabbar .tab .x:hover { opacity:1; color:#ff8d8d; background:#1f1414; }
  #tabbar #addtab { display:inline-flex; align-items:center; justify-content:center; min-width:30px; padding:7px 10px;
    background:transparent; border:1px solid transparent; color:var(--muted); font-size:17px; line-height:1; cursor:pointer;
    border-radius:8px 8px 0 0; }
  #tabbar #addtab:hover { color:var(--accent); background:#0d0d0d; }

  main { flex:1; display:flex; min-height:0; }
  #termwrap { flex:1; min-width:0; padding:8px 0 8px 8px; }
  #term { width:100%; height:100%; }

  #side { width:330px; border-left:1px solid var(--line); display:flex; flex-direction:column; background:var(--panel); }
  #side .head { padding:10px 12px; font-size:12px; color:var(--muted); border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:8px; }
  #side .head .me { color:var(--fg); }
  #side .head input { width:120px; background:#0d0d0d; border:1px solid var(--line); border-radius:6px; color:var(--fg);
    font:inherit; font-size:12px; padding:4px 7px; }
  #side .head button { background:#0d0d0d; border:1px solid var(--line); color:var(--fg); border-radius:6px;
    font:inherit; font-size:11px; padding:4px 8px; cursor:pointer; }
  #chatlog { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; font-size:13px; }
  #chatlog .msg .who { font-weight:700; }
  #chatlog .msg .txt { color:var(--fg); white-space:pre-wrap; word-break:break-word; }
  #chatlog .sys { color:var(--muted); font-size:11px; font-style:italic; text-align:center; }
  #chatbar { display:flex; gap:8px; padding:10px; border-top:1px solid var(--line); }
  #chatinput { flex:1; background:#0d0d0d; border:1px solid var(--line); border-radius:8px; color:var(--fg);
    font:inherit; font-size:13px; padding:9px 10px; }
  #chatinput:focus { outline:none; border-color:var(--accent); }
  #chatsend { background:var(--accent); color:#1a0f0a; border:0; border-radius:8px; font:inherit; font-weight:700;
    padding:0 14px; cursor:pointer; }
</style>
</head>
<body>
  <div id="login">
    <div class="card">
      <h1><b>collabterm</b> — shared session</h1>
      <p>Everyone here shares the same terminals. Open as many tabs as you need.</p>
      <label for="pw">Password</label>
      <input id="pw" type="password" autocomplete="off" placeholder="shared password">
      <label for="nm">Display name <span style="text-transform:none">(blank = auto)</span></label>
      <input id="nm" type="text" autocomplete="off" placeholder="auto-generated">
      <button id="join">Join session</button>
      <div id="err"></div>
    </div>
  </div>

  <div id="app">
    <header>
      <span class="dot"></span>
      <span class="title"><b>collabterm</b> · shared terminals</span>
      <span id="reconn" style="display:none; color:#e0c285; font-size:11px;">reconnecting…</span>
      <span class="users" id="users"></span>
      <button id="killbtn" title="Stop the session for everyone and kill all terminals">Stop session</button>
    </header>
    <div id="tabbar">
      <button id="addtab" title="New terminal tab">+</button>
    </div>
    <main>
      <div id="termwrap"><div id="term"></div></div>
      <div id="side">
        <div class="head">
          <span>you: <span class="me" id="me">—</span></span>
          <input id="newname" type="text" placeholder="rename" maxlength="24">
          <button id="rename">set</button>
        </div>
        <div id="chatlog"></div>
        <div id="chatbar">
          <input id="chatinput" type="text" placeholder="message the group…" maxlength="800">
          <button id="chatsend">Send</button>
        </div>
      </div>
    </main>
  </div>

  <div id="killed"><div class="box">
    <h2>Session ended</h2>
    <p>The host stopped this collabterm session. All shared terminals and the public
       link have been shut down.</p>
  </div></div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script>
(function(){
  var $ = function(id){ return document.getElementById(id); };
  var ws = null, term = null;
  var ADMIN = new URLSearchParams(location.search).get('admin') || '';
  var me = { name:'—', color:'#e6e6e6' };
  var tabs = [];            // [{id, title}]
  var buffers = {};         // id -> scrollback string (kept so switching is instant)
  var activeTab = null;     // id this user is viewing
  var users = [];           // roster incl. which tab each user views
  var pendingFocus = null;  // a tab id we just created and want to jump to

  // auto-reconnect state: creds are kept so a dropped socket silently re-joins
  // without re-prompting. The shared terminals live in the host's server (not in
  // the socket), so reconnecting re-attaches us to still-running CLI sessions.
  var savedPw = '', savedNm = '';
  var stopped = false, reconnecting = false;
  var reconnectTimer = null, reconnectDelay = 1000;

  function showErr(t){ $('err').textContent = t || ''; }

  $('join').addEventListener('click', join);
  $('pw').addEventListener('keydown', function(e){ if(e.key==='Enter') join(); });
  $('nm').addEventListener('keydown', function(e){ if(e.key==='Enter') join(); });

  function join(){
    var pw = $('pw').value;
    var nm = $('nm').value.trim();
    if(!pw){ showErr('Enter the password.'); return; }
    savedPw = pw; savedNm = nm;          // remembered so reconnects need no re-login
    stopped = false; reconnectDelay = 1000;
    showErr('connecting…');
    connect();
  }

  // (Re)open the WebSocket from the saved credentials. Used for the first join
  // AND by the auto-reconnect logic, so a dropped connection never re-prompts.
  function connect(){
    var proto = location.protocol === 'https:' ? 'wss' : 'ws';
    var url = proto + '://' + location.host + '/?key=' + encodeURIComponent(savedPw) +
              (savedNm ? '&name=' + encodeURIComponent(savedNm) : '') +
              (ADMIN ? '&admin=' + encodeURIComponent(ADMIN) : '');
    try { ws = new WebSocket(url); } catch(e){ scheduleReconnect(); return; }
    var opened = false;
    ws.onopen = function(){ opened = true; };
    ws.onmessage = onMessage;
    ws.onclose = function(){
      if(stopped) return;                 // host stopped the session - stay down
      if(term){                           // had a live session: keep it, reconnect
        if(!reconnecting){ reconnecting = true; setReconnecting(true); sys('— connection lost, reconnecting… —'); }
        scheduleReconnect();
      } else {
        showErr(opened ? 'Disconnected.' : 'Wrong password or server unreachable.');
      }
    };
    ws.onerror = function(){ if(!term) showErr('Connection failed.'); };
  }

  function scheduleReconnect(){
    if(stopped || reconnectTimer) return;             // one pending attempt at a time
    reconnectTimer = setTimeout(function(){ reconnectTimer = null; connect(); }, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 10000); // exponential backoff, capped at 10s
  }

  function setReconnecting(on){ var el = $('reconn'); if(el) el.style.display = on ? 'inline' : 'none'; }

  function send(obj){ if(ws && ws.readyState===1) ws.send(JSON.stringify(obj)); }

  function onMessage(ev){
    var m; try { m = JSON.parse(ev.data); } catch(e){ return; }
    if(m.type === 'init'){ if(term) resync(m); else startApp(m); }
    else if(m.type === 'out'){
      buffers[m.tab] = (buffers[m.tab] || '') + m.data;
      if(buffers[m.tab].length > 200000) buffers[m.tab] = buffers[m.tab].slice(-200000);
      if(m.tab === activeTab && term) term.write(m.data);
    }
    else if(m.type === 'tabs'){ tabs = m.tabs; reconcileTabs(); }
    else if(m.type === 'tab-created'){ pendingFocus = m.id; }
    else if(m.type === 'chat'){ addChat(m.name, m.color, m.text); }
    else if(m.type === 'sys'){ sys(m.text); }
    else if(m.type === 'users'){ users = m.users; renderUsers(); renderTabs(); }
    else if(m.type === 'killed'){ sessionEnded(); }
  }

  function startApp(m){
    $('login').style.display = 'none';
    $('app').style.display = 'flex';
    me = m.you;
    $('me').textContent = me.name;
    $('me').style.color = me.color;

    tabs = m.tabs.map(function(t){ return { id:t.id, title:t.title }; });
    m.tabs.forEach(function(t){ buffers[t.id] = t.scrollback || ''; });
    activeTab = tabs.length ? tabs[0].id : null;

    term = new Terminal({
      cols: m.cols || 120, rows: m.rows || 32,
      cursorBlink: true, fontSize: 14,
      fontFamily: "'Cascadia Code','Cascadia Mono',Consolas,monospace",
      theme: { background:'#0d0d0d', foreground:'#e6e6e6', cursor:'#d97757', selectionBackground:'#3a3d41' }
    });
    term.open($('term'));
    term.onData(function(d){ if(activeTab!=null) send({type:'in', tab:activeTab, data:d}); });

    renderTabs();
    paintActive();
    term.focus();

    // terminal copy/paste helpers
    function pasteText(t){ if(t && activeTab!=null) send({type:'in', tab:activeTab, data:t}); }
    function copySel(){ var s = term.getSelection(); if(s){ navigator.clipboard.writeText(s).catch(function(){}); } return s; }
    var termEl = $('term');
    termEl.addEventListener('contextmenu', function(e){
      e.preventDefault();
      var s = copySel();
      if (s && s.length) { term.clearSelection(); }
      else { navigator.clipboard.readText().then(pasteText).catch(function(){}); }
    });
    term.attachCustomKeyEventHandler(function(e){
      if (e.type !== 'keydown' || !e.ctrlKey || !e.shiftKey) return true;
      var k = (e.key || '').toLowerCase();
      if (k === 'c') { copySel(); return false; }
      if (k === 'v') { navigator.clipboard.readText().then(pasteText).catch(function(){}); return false; }
      return true;
    });

    $('addtab').addEventListener('click', function(){ send({type:'tab-new'}); });
    if(me.isHost){
      var kb = $('killbtn');
      kb.style.display = 'inline-block';
      kb.addEventListener('click', confirmKill);
    }
    $('chatsend').addEventListener('click', sendChat);
    $('chatinput').addEventListener('keydown', function(e){ if(e.key==='Enter') sendChat(); });
    $('rename').addEventListener('click', doRename);
    $('newname').addEventListener('keydown', function(e){ if(e.key==='Enter') doRename(); });
  }

  // Re-attach after an auto-reconnect WITHOUT rebuilding the xterm or re-binding
  // listeners (startApp must run exactly once). The server's fresh `init` carries
  // the authoritative tabs + recent scrollback, so we just resync our view to it.
  function resync(m){
    me = m.you;
    $('me').textContent = me.name; $('me').style.color = me.color;
    tabs = m.tabs.map(function(t){ return { id:t.id, title:t.title }; });
    buffers = {};
    m.tabs.forEach(function(t){ buffers[t.id] = t.scrollback || ''; });
    if(activeTab == null || !tabFor(activeTab)) activeTab = tabs.length ? tabs[0].id : null;
    users = m.users || [];
    paintActive(); renderTabs(); renderUsers();
    if(reconnecting){ reconnecting = false; setReconnecting(false); reconnectDelay = 1000; sys('— reconnected —'); }
  }

  // keep local buffers/active selection sane when the tab set changes
  function reconcileTabs(){
    var ids = {}; tabs.forEach(function(t){ ids[t.id] = true; });
    Object.keys(buffers).forEach(function(id){ if(!ids[+id]) delete buffers[+id]; });

    if(pendingFocus != null && ids[pendingFocus]){ switchTo(pendingFocus); pendingFocus = null; return; }
    if(activeTab == null || !ids[activeTab]){
      activeTab = tabs.length ? tabs[0].id : null;
      paintActive();
    }
    renderTabs();
  }

  function switchTo(id){
    if(id === activeTab) { if(term) term.focus(); return; }
    activeTab = id;
    send({type:'tab-view', tab:id});
    paintActive();
    renderTabs();
    if(term) term.focus();
  }

  // repaint the xterm with the selected tab's buffered output
  function paintActive(){
    if(!term) return;
    term.reset();
    if(activeTab!=null && buffers[activeTab]) term.write(buffers[activeTab]);
  }

  function viewersOf(id){ return users.filter(function(u){ return u.tab === id; }); }

  function renderTabs(){
    var bar = $('tabbar');
    // wipe existing tab nodes (keep the + button)
    Array.prototype.slice.call(bar.querySelectorAll('.tab')).forEach(function(n){ n.remove(); });
    var add = $('addtab');

    tabs.forEach(function(t){
      var el = document.createElement('div');
      el.className = 'tab' + (t.id === activeTab ? ' active' : '');
      el.addEventListener('click', function(e){ if(e.target.classList.contains('x')) return; switchTo(t.id); });

      var label = document.createElement('span');
      label.className = 'label';
      label.textContent = t.title;
      label.title = 'double-click to rename';
      label.addEventListener('dblclick', function(e){ e.stopPropagation(); renameTab(t, label); });
      el.appendChild(label);

      // dots for other people currently viewing this tab
      var others = viewersOf(t.id).filter(function(u){ return u.name !== me.name; });
      if(others.length){
        var badge = document.createElement('span'); badge.className = 'badge';
        badge.title = others.map(function(u){ return u.name; }).join(', ') + ' here';
        others.slice(0,4).forEach(function(u){ var i=document.createElement('i'); i.style.background=u.color; badge.appendChild(i); });
        el.appendChild(badge);
      }

      if(tabs.length > 1){
        var x = document.createElement('span'); x.className = 'x'; x.textContent = '×'; x.title = 'close tab';
        x.addEventListener('click', function(e){ e.stopPropagation(); send({type:'tab-close', tab:t.id}); });
        el.appendChild(x);
      }

      bar.insertBefore(el, add);
    });
  }

  function renameTab(t, label){
    label.contentEditable = 'true';
    label.focus();
    var range = document.createRange(); range.selectNodeContents(label);
    var sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
    function commit(){
      label.contentEditable = 'false';
      var v = label.textContent.trim().slice(0,32);
      if(v && v !== t.title) send({type:'tab-rename', tab:t.id, title:v});
      else label.textContent = t.title;
      label.removeEventListener('blur', commit);
      label.removeEventListener('keydown', onKey);
    }
    function onKey(e){ if(e.key==='Enter'){ e.preventDefault(); label.blur(); } if(e.key==='Escape'){ label.textContent=t.title; label.blur(); } }
    label.addEventListener('blur', commit);
    label.addEventListener('keydown', onKey);
  }

  function sendChat(){
    var v = $('chatinput').value.trim();
    if(!v) return;
    send({type:'chat', text:v});
    $('chatinput').value = '';
  }
  function doRename(){
    var v = $('newname').value.trim();
    if(!v) return;
    send({type:'name', name:v});
    me.name = v;
    $('me').textContent = v;
    $('newname').value = '';
  }

  // host-only: stop the whole session (kills every terminal + the public link)
  function confirmKill(){
    var ok = window.confirm(
      'Stop the session for everyone?\n\n' +
      'This kills every shared terminal (and whatever is running in them, like ' +
      'Claude Code) and shuts down the public link. It cannot be undone.');
    if(!ok) return;
    $('killbtn').disabled = true;
    $('killbtn').textContent = 'Stopping…';
    send({type:'kill-all'});
  }
  function sessionEnded(){
    stopped = true;                          // host ended it - do not auto-reconnect
    if(reconnectTimer){ clearTimeout(reconnectTimer); reconnectTimer = null; }
    try { if(ws) ws.close(); } catch(e){}
    if(term){ try { term.dispose(); } catch(e){} }
    $('killed').style.display = 'flex';
  }

  function addChat(name, color, text){
    var log = $('chatlog');
    var d = document.createElement('div');
    d.className = 'msg';
    var who = document.createElement('span'); who.className='who'; who.style.color = color || '#e6e6e6'; who.textContent = name + ': ';
    var txt = document.createElement('span'); txt.className='txt'; txt.textContent = text;
    d.appendChild(who); d.appendChild(txt);
    log.appendChild(d); log.scrollTop = log.scrollHeight;
  }
  function sys(text){
    var log = $('chatlog');
    var d = document.createElement('div'); d.className='sys'; d.textContent = text;
    log.appendChild(d); log.scrollTop = log.scrollHeight;
  }
  function renderUsers(){
    var box = $('users'); box.innerHTML = '';
    users.forEach(function(u){
      var s = document.createElement('span'); s.className='chip'; s.style.color = u.color;
      var nm = document.createElement('span'); nm.textContent = u.name; s.appendChild(nm);
      var t = tabFor(u.tab);
      if(t){ var on = document.createElement('span'); on.className='on'; on.textContent = '· ' + t.title; s.appendChild(on); }
      if(u.host){ var h = document.createElement('span'); h.className='on'; h.textContent = '· host'; s.appendChild(h); }
      box.appendChild(s);
    });
  }
  function tabFor(id){ for(var i=0;i<tabs.length;i++) if(tabs[i].id===id) return tabs[i]; return null; }
})();
</script>
</body>
</html>
